<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>전북교육연수원 식단 PDF</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="control-panel" aria-label="식단 가져오기">
        <div>
          <p class="eyebrow">전북특별자치도교육청교육연수원</p>
          <h1>월간 식단 PDF 생성</h1>
        </div>
        <div class="actions">
          <label class="month-field" for="monthInput">
            <span>조회 월</span>
            <input id="monthInput" type="month" />
          </label>
          <button id="loadButton" type="button">식단 가져오기</button>
          <button id="pdfButton" type="button" disabled>PDF 다운로드</button>
        </div>
        <p id="status" class="status">월을 선택한 뒤 식단 가져오기를 누르면 월간표와 날짜별 메뉴를 정리합니다.</p>
      </section>

      <section id="report" class="report" aria-live="polite">
        <section class="report-cover">
          <p>JBEdu Meal Planner</p>
          <h2>식단 정보를 불러와 주세요</h2>
          <span>알레르기 정보, 원산지, 영양 참고사항은 제외됩니다.</span>
        </section>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
